name: Release proxy binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_ref: ${{ steps.tag.outputs.release_ref }}

    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v" >&2; exit 1 ;;
          esac
          printf 'release_tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'release_ref=refs/tags/%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  test:
    name: Test and vet
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            extension: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          EXTENSION: ${{ matrix.extension }}
        run: |
          mkdir -p dist
          asset="freebuff-proxy-${GOOS}-${GOARCH}"
          binary="${asset}${EXTENSION}"
          go build -trimpath -ldflags="-s -w" -o "dist/${binary}" ./cmd/freebuff-proxy
          tar -C dist -czf "dist/${asset}.tar.gz" "${binary}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: freebuff-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: freebuff-proxy-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" dist/*.tar.gz \
            --target "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes "freebuff-proxy $RELEASE_TAG — linux-amd64, linux-arm64, darwin-amd64, darwin-arm64, windows-amd64"
